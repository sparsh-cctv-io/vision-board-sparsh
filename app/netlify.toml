[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to Netlify Functions (placed before the SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback: serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


